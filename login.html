<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Freight Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0033a0, #c8102e);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      background: #fff;
      padding: 35px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #0033a0;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }

    input:focus {
      border-color: #0033a0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #c8102e;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #a50e24;
    }

    .links {
      margin-top: 15px;
      font-size: 13px;
    }

    .links a {
      color: #0033a0;
      text-decoration: none;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="logo">Island Freight</div>
    <div class="subtitle">Secure Customer Login</div>

    <form>
      <input type="email" placeholder="Email Address" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="links">
      <p><a href="#">Forgot Password?</a></p>
      <p>Don’t have an account? <a href="signup.html">Sign Up</a></p>
    </div>
  </div>

</body>
</html>
