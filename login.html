<!DOCTYPE html>
<html>
<head>
  <title>Login - Griffiths SureShip</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family:Arial;background:#f8fafc;padding:20px;">

<h2 style="text-align:center;color:#0ea5e9;">Griffiths SureShip</h2>

<div style="background:white;padding:20px;border-radius:12px;max-width:400px;margin:auto;">
  <h3>Login</h3>

  <input type="email" placeholder="Email"
    style="width:100%;padding:12px;margin-bottom:10px;">

  <input type="password" placeholder="Password"
    style="width:100%;padding:12px;margin-bottom:10px;">

  <button
    style="width:100%;padding:12px;background:#14b8a6;color:white;border:none;border-radius:8px;">
    Login
  </button>

  <p style="text-align:center;">
    Don't have an account?
    <a href="signup.html">Sign Up</a>
  </p>
</div>

</body>
</html>
