<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GriffithsSureShip - Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Professional freight background */
      background: linear-gradient(135deg, #f5f9ff, #d6e8ff);
    }

    .login-container {
      background: #ffffff;
      width: 360px;
      padding: 35px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      text-align: center;
    }

    /* Branding */
    .logo-box {
      width: 60px;
      height: 60px;
      background: #0033a0;
      color: white;
      font-size: 30px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px auto;
    }

    .company-name {
      font-size: 20px;
      font-weight: bold;
      color: #0033a0;
    }

    .tagline {
      font-size: 12px;
      color: #666;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #0033a0;
      box-shadow: 0 0 5px rgba(0,51,160,0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #c8102e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #a50e24;
    }

    .links {
      margin-top: 15px;
      font-size: 13px;
    }

    .links a {
      color: #0033a0;
      text-decoration: none;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="login-container">

    <!-- BRANDING -->
    <div class="logo-box">🚚</div>
    <div class="company-name">Griffiths SureShip</div>
    <div class="tagline">Fast • Secure • Reliable Shipping</div>

    <!-- LOGIN FORM -->
    <form>
      <input type="email" placeholder="Email Address" required>
      <input type="password" placeholder="Password" required>
      <button type="button" onclick="goDashboard()">
  Login
</button>
      <button type="submit">Login</button>
    </form>

    <!-- LINKS -->
    <div class="links">
      <p><a href="#">Forgot Password?</a></p>
      <p>Don’t have an account? <a href="signup.html">Sign Up</a></p>
    </div>
    <button onclick="goDashboard()">Login</button>

  </div>
<script>
function goDashboard() {
  window.location.href = "dashboard.html";
}
</script>
</body>
</html>
